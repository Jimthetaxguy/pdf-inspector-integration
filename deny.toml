# cargo-deny configuration — license enforcement
# Run: cargo install cargo-deny && cargo deny check licenses

[graph]
all-features = false
no-default-features = false

[licenses]
# Allowed licenses (covers our entire current dependency graph)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",       # file-level copyleft only — does not contaminate our code
    "0BSD",
    "Unlicense",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "warn"
unmaintained = "workspace"

[sources]
unknown-registry = "deny"
unknown-git = "allow"   # we pin pdf-inspector + lopdf via git rev
